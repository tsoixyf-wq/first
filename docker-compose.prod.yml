version: "3.9"

# =============================================================================
# Production Docker Compose — Resume Matcher
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and fill in production values
#   2. docker-compose -f docker-compose.prod.yml up -d --build
#   (alembic migration runs automatically before backend starts)
#
# Key differences from dev compose:
#   - No bind mounts (images contain built code)
#   - No hot-reload (uvicorn --reload removed)
#   - Resource limits on all services
#   - Restart policy: unless-stopped
#   - No exposed ports for databases/redis/minio — only backend + frontend
#   - Celery worker concurrency tuned for production
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rm-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resume}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
      POSTGRES_DB: ${POSTGRES_DB:-resume_matcher}
    ports:
      - "127.0.0.1:5432:5432"  # Only localhost, never public
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resume} -d ${POSTGRES_DB:-resume_matcher}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  chromadb:
    image: chromadb/chroma:latest
    container_name: rm-prod-chroma
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  redis:
    image: redis:7-alpine
    container_name: rm-prod-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  minio:
    image: minio/minio:latest
    container_name: rm-prod-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:?err}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?err}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rm-prod-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      # Override for production — no DEBUG, no hot-reload
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # Mount only data directory for skill taxonomy
      - ./data:/app/data:ro
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rm-prod-celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "false"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=4
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_HOST: ${NEXT_PUBLIC_API_HOST:-backend}
    container_name: rm-prod-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_HOST: ${NEXT_PUBLIC_API_HOST:-backend}
    depends_on:
      - backend
    command: node server.js
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
